<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opal 画廊</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <a class="site-logo" href="#">
      <svg class="logo-mark" viewBox="0 0 34 34" fill="none" aria-label="Gallery logo">
        <rect width="34" height="34" rx="8" fill="var(--color-primary)" opacity="0.12" />
        <circle cx="12.5" cy="14" r="3.5" stroke="var(--color-primary)" stroke-width="1.8" />
        <path d="M4.5 26.5 L10.5 19 L17 24 L23 15.5 L29.5 26.5Z" fill="var(--color-primary)" opacity="0.55" />
        <path d="M4.5 26.5 L10.5 19 L17 24 L23 15.5 L29.5 26.5Z" stroke="var(--color-primary)" stroke-width="1.4"
          stroke-linejoin="round" fill="none" />
      </svg>
      <span class="logo-text">Opal 画廊</span>
    </a>
    <div class="header-actions">
      <button class="theme-toggle" data-theme-toggle aria-label="Switch to dark mode">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5" />
          <path
            d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
        </svg>
      </button>
    </div>
  </header>
  <div class="toolbar" id="gallery-anchor">
    <div class="toolbar-row">
      <div class="search-wrap">
        <span class="search-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
        </span>
        <input class="search-input" id="search-input" type="search" placeholder="搜索标题、描述…" autocomplete="off"
          aria-label="搜索">
        <button class="search-clear" id="search-clear" aria-label="清除">✕</button>
      </div>
      <span class="chip-group-label">版权</span>
      <div class="chips-wrap" id="chips-copyright" style="flex:0 0 auto;"></div>
      <span class="chip-group-label" style="margin-left:var(--space-2)">教派</span>
      <div class="chips-wrap" id="chips-religion"></div>
    </div>
    <div class="toolbar-row">
      <span class="chip-group-label">类型</span>
      <div class="chips-wrap" id="chips-type"></div>
    </div>
    <div class="active-tags-row" id="active-tags-row">
      <span style="font-size:var(--text-xs);color:var(--color-text-faint);white-space:nowrap;flex-shrink:0;">已筛选</span>
      <div id="active-tags" style="display:flex;flex-wrap:wrap;gap:var(--space-2);"></div>
      <button class="clear-all-btn" onclick="clearAllFilters()">清除全部</button>
    </div>
  </div>
  <div class="loading-overlay" id="loading-overlay">
    <div class="loading-card">
      <div class="loading-logo">
        <svg class="logo-mark loading-logo-spin" viewBox="0 0 34 34" fill="none">
          <rect width="34" height="34" rx="8" fill="var(--color-primary)" opacity="0.12" />
          <circle cx="12.5" cy="14" r="3.5" stroke="var(--color-primary)" stroke-width="1.8" />
          <path d="M4.5 26.5 L10.5 19 L17 24 L23 15.5 L29.5 26.5Z" fill="var(--color-primary)" opacity="0.55" />
          <path d="M4.5 26.5 L10.5 19 L17 24 L23 15.5 L29.5 26.5Z" stroke="var(--color-primary)" stroke-width="1.4"
            stroke-linejoin="round" fill="none" />
        </svg>
      </div>
      <p class="loading-title">Opal 画廊</p>
      <p class="loading-subtitle" id="loading-subtitle">正在加载图库数据…</p>
      <div class="loading-bar-track">
        <div class="loading-bar-fill" id="loading-bar-fill"></div>
      </div>
    </div>
  </div>
  <main class="gallery-section" id="gallery" style="padding-top:var(--space-6);">
    <div class="gallery-stats">
      <span class="gallery-count">显示 <strong id="visible-count">0</strong> 张 · 按时间从新到旧</span>
      <div class="gallery-divider"></div>
    </div>
    <div class="gallery-grid" id="gallery-grid"></div>
    <div class="empty-state" id="empty-state" style="display:none;">
      <div class="empty-icon">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2" />
          <circle cx="8.5" cy="8.5" r="1.5" />
          <path d="M21 15l-5-5L5 21" />
        </svg>
      </div>
      <h3>没有找到匹配的 Opal 流程</h3>
      <p>尝试修改筛选条件或搜索关键词。</p>
    </div>
  </main>
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="图片查看器">
    <div class="lightbox-inner">
      <div class="lightbox-image-pane">
        <img id="lb-img" src="" alt="" loading="eager">
        <button class="lb-nav lb-nav-prev" id="lb-prev" onclick="navigateLightbox(-1)" aria-label="上一张">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M15 18l-6-6 6-6" />
          </svg>
        </button>
        <button class="lb-nav lb-nav-next" id="lb-next" onclick="navigateLightbox(1)" aria-label="下一张">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M9 18l6-6-6-6" />
          </svg>
        </button>
        <div class="lightbox-type-badge" id="lb-type-badge"></div>
      </div>
      <div class="lightbox-info">
        <button class="lightbox-close" onclick="closeLightbox()" aria-label="关闭">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M18 6L6 18M6 6l12 12" />
          </svg>
        </button>
        <h2 class="lb-title" id="lb-title"></h2>
        <div class="lb-meta">
          <div class="lb-meta-row">
            <svg class="lb-meta-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" />
              <path d="M16 2v4M8 2v4M3 10h18" />
            </svg>
            <span id="lb-date"></span>
          </div>
          <div class="lb-meta-row">
            <svg class="lb-meta-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2">
              <circle cx="12" cy="12" r="3" />
              <path d="M3 12a9 9 0 0 0 9 9 9 9 0 0 0 9-9 9 9 0 0 0-9-9 9 9 0 0 0-9 9z" />
            </svg>
            <span id="lb-type-text"></span>
          </div>
          <div class="lb-meta-row" style="margin-top:var(--space-2)" id="lb-copyright-row"></div>
          <div class="lb-meta-row" style="margin-top:var(--space-1)">
            <svg class="lb-meta-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <span id="lb-click-count" style="font-size:var(--text-xs);color:var(--color-text-faint);"></span>
          </div>
        </div>
        <div class="lb-divider"></div>
        <div class="lb-desc-label">使用说明</div>
        <p class="lb-desc" id="lb-desc"></p>
        <a class="lb-open-link" id="lb-link" href="#" target="_blank" rel="noopener noreferrer">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6" />
            <path d="M15 3h6v6" />
            <path d="M10 14L21 3" />
          </svg>
          查看更多预览图
        </a>
        <div class="lb-author-section">
          <div class="lb-author-avatar" id="lb-author-avatar"></div>
          <div class="lb-author-info">
            <span class="lb-author-label">作者</span>
            <span class="lb-author-name" id="lb-author-name"></span>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="pagination-bar" id="pagination-bar" style="display:none;">
    <button class="page-btn page-arrow" id="pg-prev" onclick="goPage(currentPage-1)" aria-label="上一页">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M15 18l-6-6 6-6" />
      </svg>
    </button>
    <div id="pg-numbers" style="display:flex;align-items:center;gap:4px;"></div>
    <button class="page-btn page-arrow" id="pg-next" onclick="goPage(currentPage+1)" aria-label="下一页">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M9 18l6-6-6-6" />
      </svg>
    </button>
  </div>
  <script src="main.js"></script>
</body>
</html>
